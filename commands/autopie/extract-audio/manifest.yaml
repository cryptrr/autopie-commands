schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.extract-audio"
namespace: "autopie"
name: "Extract Audio from File"
commandSlug: "ffmpeg"
summary: "AutoPie command for Extract Audio from File"
type: "PACKAGE"
tags: ["ffmpeg"]
runtime:
  path: ""
  command: "ffmpeg -i \"${INPUT_FILE}\" -b:a ${BITRATE} -vn \"${INPUT_FILE}.$FORMAT\""
  extras:
    - id: "715336"
      name: "BITRATE"
      type: "STRING"
      default: "195K"
      description: "A value from 56K to 320K.\nLarger means better quality."
      required: false
    - id: "480077"
      name: "FORMAT"
      type: "SELECTABLE"
      default: "mp3"
      description: "Select output format you want."
      required: true
      selectableOptions: ["mp3", "m4a", "aac", "opus", "vorbis", "flac", "wav"]
install:
  primaryPackage: "ffmpeg"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
