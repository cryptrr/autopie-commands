schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.remove-audio"
namespace: "autopie"
name: "Remove Audio"
commandSlug: "ffmpeg"
summary: "AutoPie command for Remove Audio"
type: "PACKAGE"
tags: ["ffmpeg"]
runtime:
  path: ""
  command: "ffmpeg -i \"${INPUT_FILE}\" -an -c:v copy \"${INPUT_FILE}-noaud.mp4\""
  deleteSourceFile: false
install:
  primaryPackage: "ffmpeg"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
