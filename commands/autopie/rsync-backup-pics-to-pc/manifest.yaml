schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.rsync-backup-pics-to-pc"
namespace: "autopie"
name: "RSYNC: Backup Pics to PC"
commandSlug: "rsync"
summary: "AutoPie command for RSYNC: Backup Pics to PC"
type: "PACKAGE"
tags: ["rsync"]
runtime:
  path: ""
  command: "rsync -avz \"${FOLDER_FROM}\" \"${FOLDER_TO}\""
  extras:
    - id: "093901"
      name: "RSYNC_PASSWORD"
      type: "STRING"
      default: ""
      description: "The remote machine should be running RSYNC daemon.\nFor security reasons, limit the usage of the RSYNC protocol to the local network."
      required: true
      flags: ["--password", "--internal-config"]
    - id: "557719"
      name: "FOLDER_TO"
      type: "STRING"
      default: "rsync://user@host/path/to/folder/"
      description: "The remote folder to send backups to.\nShould be in the format 'rsync://user@host/path/to/folder/'"
      required: false
      flags: ["--internal-config"]
    - id: "267285"
      name: "FOLDER_FROM"
      type: "STRING"
      default: "/storage/emulated/0/Pictures/"
      description: "Absolute path to the folder on your device"
      required: false
      flags: ["--internal-config"]
install:
  primaryPackage: "rsync"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
