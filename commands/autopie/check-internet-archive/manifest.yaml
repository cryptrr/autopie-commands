schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.check-internet-archive"
namespace: "autopie"
name: "Check Internet Archive"
commandSlug: ""
summary: "AutoPie command for Check Internet Archive"
type: "PACKAGE"
tags: ["python"]
runtime:
  path: ""
  command: "#@PYTHON\n#@OPEN_LOGS\n\nimport os\nimport sys\nimport subprocess\nimport json\nimport urllib.parse\nimport urllib.request\n\ndef latest_wayback_snapshot(url: str) -> str | None:\n    api = \"https://archive.org/wayback/available\"\n    query = urllib.parse.urlencode({\"url\": url})\n    api_url = f\"{api}?{query}\"\n\n    with urllib.request.urlopen(api_url, timeout=20) as r:\n        data = json.loads(r.read().decode(\"utf-8\"))\n\n    snapshot = data.get(\"archived_snapshots\", {}).get(\"closest\")\n    if snapshot and snapshot.get(\"available\"):\n        return snapshot.get(\"url\")\n\n    return None\n\n\n\ndef main():\n    \n    url = os.getenv(\"INPUT_URL\")\n    print(\"CHECKING...\", flush=True)\n    snapshot_url = latest_wayback_snapshot(url)\n\n    if snapshot_url:\n        print(snapshot_url)\n        subprocess.run([\n            \"am\",\n            \"start\",\n            \"-a\",\n            \"android.intent.action.VIEW\",\n            \"-d\",\n            snapshot_url,\n        ], stdout=subprocess.DEVNULL,stderr=subprocess.DEVNULL,check=True)\n    else:\n        print(\"No snapshot found\", file=sys.stderr)\n        sys.exit(2)\n\n\nif __name__ == \"__main__\":\n    main()\n"
install:
  primaryPackage: "python"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
