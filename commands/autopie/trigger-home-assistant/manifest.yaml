schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.trigger-home-assistant"
namespace: "autopie"
name: "Trigger Home Assistant"
commandSlug: "httpx"
summary: "AutoPie command for Trigger Home Assistant"
type: "PACKAGE"
tags: ["httpx"]
runtime:
  path: ""
  command: "httpx -m POST ${COOKIE_FILE:+--cookie-file $COOKIE_FILE} -d entity_id script.${SCRIPT_NAME} $URL"
  extras:
    - id: "829804"
      name: "COOKIE_FILE"
      type: "STRING"
      default: "/storage/emulated/0/cookies.txt"
      description: "The full path to cookie file."
      required: true
    - id: "862978"
      name: "SCRIPT_NAME"
      type: "SELECTABLE"
      default: "night_mode"
      description: "The name of the script that is defined in the home automation server."
      required: true
      selectableOptions: ["night_mode", "day_mode", "lights_off", "ambient_mode", "emergency"]
    - id: "202404"
      name: "URL"
      type: "STRING"
      default: "https://homeassistant.local/api/services/script/turn_on"
      description: "The URL endpoint."
      required: true
install:
  primaryPackage: "httpx"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
