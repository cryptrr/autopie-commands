schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.combine-images-into-pdf"
namespace: "autopie"
name: "Combine Images into PDF"
commandSlug: "magick"
summary: "AutoPie command for Combine Images into PDF"
type: "PACKAGE"
tags: ["imagemagick"]
runtime:
  path: ""
  command: "magick \"${INPUT_FILES_ARR[@]}\" -resize ${QUALITY} -gravity center -extent ${QUALITY} \"${INPUT_FILE}.pdf\""
  extras:
    - id: "771088"
      name: "QUALITY"
      type: "SELECTABLE"
      default: "720x"
      description: "Choose the PDF width."
      required: false
      selectableOptions: ["720x", "480x", "1080x"]
install:
  primaryPackage: "imagemagick"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
