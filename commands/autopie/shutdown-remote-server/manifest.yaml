schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.shutdown-remote-server"
namespace: "autopie"
name: "Shutdown Remote Server"
commandSlug: "openssh"
summary: "AutoPie command for Shutdown Remote Server"
type: "PACKAGE"
tags: ["openssh"]
runtime:
  path: ""
  command: "sshpass -p \"$PASSWORD\" \\\nssh -nT \\\n-o StrictHostKeyChecking=no \\\n\"$USER@$HOST\" \\\n\"echo '$PASSWORD' | sudo -S /sbin/shutdown -h now\""
  extras:
    - id: "735279"
      name: "USER"
      type: "STRING"
      default: ""
      description: "The SSH user on host."
      required: true
      flags: ["--internal-config"]
    - id: "486044"
      name: "HOST"
      type: "SELECTABLE"
      default: "server.local"
      description: "The SSH host to connect to."
      required: true
      flags: ["--internal-config"]
      selectableOptions: {"server.local": "server.local", "workstation.lan": "workstation.lan"}
    - id: "829258"
      name: "PASSWORD"
      type: "STRING"
      default: ""
      description: "SSH password."
      required: true
      flags: ["--password", "--internal-config"]
install:
  primaryPackage: "openssh"
  extraPackages: ["sshpass"]
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
