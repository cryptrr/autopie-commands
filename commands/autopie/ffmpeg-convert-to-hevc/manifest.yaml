schemaVersion: "2026.6.1"
version: "1.0.0"
id: "autopie.ffmpeg-convert-to-hevc"
namespace: "autopie"
name: "FFMPEG: Convert to HEVC"
commandSlug: "ffmpeg"
summary: "AutoPie command for FFMPEG: Convert to HEVC"
type: "PACKAGE"
tags: ["ffmpeg"]
runtime:
  path: ""
  command: "ffmpeg -i \"${INPUT_FILE}\" -c:v libx264 -crf 24 -preset medium \"${INPUT_FILE}-x265.mp4\""
install:
  primaryPackage: "ffmpeg"
  extraPackages: []
  installerVersion: 1
  script: "install.sh"
  sha256: "..."
uninstall:
  script: "uninstall.sh"
docs:
  readme: "README.md"
  changelog: "CHANGELOG.md"
compatibility:
  autopieMinVersion: "0.x"
  autopieMaxVersion: "0.x"
status: "stable"
maintainers: ["cryptrr"]
